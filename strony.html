<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OKP – Strony</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f0f2f5;
      color: #333;
      padding: 48px 32px;
      min-height: 100vh;
    }

    header { margin-bottom: 36px; }
    header h1 { font-size: 1.75rem; font-weight: 700; color: #1a2233; }
    header p  { font-size: 0.95rem; color: #6b7280; margin-top: 6px; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 20px;
    }

    .card {
      background: #fff;
      border-radius: 14px;
      padding: 24px 24px 20px;
      box-shadow: 0 2px 16px rgba(0,0,0,.07);
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: box-shadow .18s, transform .18s;
    }
    .card:hover {
      box-shadow: 0 6px 28px rgba(0,0,0,.13);
      transform: translateY(-3px);
    }

    .card-icon {
      font-size: 2rem;
      line-height: 1;
    }

    .card-title {
      font-size: 1rem;
      font-weight: 700;
      color: #1a2233;
    }

    .card-desc {
      font-size: 0.84rem;
      color: #6b7280;
      line-height: 1.5;
    }

    .card-link {
      font-size: 0.78rem;
      color: #4f46e5;
      font-weight: 600;
      margin-top: auto;
    }
  </style>
</head>
<body>

<header>
  <h1>OKP – Strony</h1>
  <p>Nawigacja do wszystkich stron projektu</p>
</header>

<div class="grid">

  <a class="card" href="index.html">
    <div class="card-icon">📊</div>
    <div class="card-title">Histogram Czasów Realizacji</div>
    <div class="card-desc">Rozkład czasu realizacji według zadeklarowanego rozmiaru zadania (S / M / L).</div>
    <div class="card-link">index.html →</div>
  </a>

</div>

</body>
</html>
